<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>SuporteSparkz</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: Arial, sans-serif;

      /* fundo degradê laranja */
      background: linear-gradient(135deg, #1a0f00, #ff7a00);
      color: #fff;
    }

    .card {
      text-align: center;
      background: rgba(0, 0, 0, 0.6);
      padding: 40px;
      border-radius: 15px;
      box-shadow: 0 0 25px rgba(255, 122, 0, 0.6);
      backdrop-filter: blur(8px);
    }

    h1 {
      margin-bottom: 10px;
      color: #ff9a3c;
    }

    p {
      opacity: 0.9;
    }

    a {
      display: inline-block;
      margin-top: 15px;
      padding: 10px 20px;
      border-radius: 8px;
      background: #ff7a00;
      color: white;
      text-decoration: none;
      transition: 0.3s;
    }

    a:hover {
      background: #ff9a3c;
      transform: scale(1.05);
    }
  </style>
</head>

<body>
  <div class="card">
    <h1>🔥 SuporteSparkz</h1>
    <p>Meu site está no ar via GitHub Pages!</p>

    <a href="https://github.com/SuporteSparkz" target="_blank">
      Meu GitHub
    </a>
  </div>
</body>
</html>
